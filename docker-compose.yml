version: "3.9"

services:
  # ── PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scriptum
      POSTGRES_USER: ${POSTGRES_USER:-scriptum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scriptum_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scriptum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Scriptum App ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PORT:-3010}:3010"
    environment:
      DATABASE_PROVIDER: postgresql
      DATABASE_URL: postgresql://${POSTGRES_USER:-scriptum}:${POSTGRES_PASSWORD:-scriptum_secret}@db:5432/scriptum
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3010}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL:-http://localhost:3010}
      AUTH_TRUST_HOST: "true"
      MCP_ENABLED: ${MCP_ENABLED:-false}
    volumes:
      - uploads_data:/app/public/uploads
    command: >
      sh -c "node node_modules/prisma/build/index.js db push --skip-generate && node server.js"

volumes:
  postgres_data:
  uploads_data:
